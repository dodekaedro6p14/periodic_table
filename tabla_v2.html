<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Periódica - Bio-Digital Edition</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #818cf8;
            --accent: #e74c3c;
            --bg-color: #0f172a;
            --text: #333;
            --white: #ffffff;
            --black: #1e293b;
            --color-fuente: #fff;
            --color_fondo: #000;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --energy-color: #f9e231;
            --border-color: #30363d;
            --footer-color: #8b949e;

            /* Colores por Categoría */
            --alcalinos: #ff7b72;
            --alcalinoterreos: #ffa657;
            --transicion: #d2a8ff;
            --otros-metales: #7ee787;
            --no-metales: #58a6ff;
            --halogenos: #ffea7f;
            --gases-nobles: #ff78cb;
            --lantanidos: #7afaff;
            --actinidos: #ff9bce;
            --o_metales: #40ff00;
            --metaloides: #ff0000;
            --ele_desconocidos: #595959;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
            /*    margin-bottom: 30px;*/
        }

        .table-container {
            width: 95vw;
            overflow-x: auto;
            padding: 20px;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(65px, 1fr));
            grid-gap: 4px;
            min-width: 1100px;
        }

        .element {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 5px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            cursor: default;
            position: relative;
            min-height: 85px;
            font-size: 0.65rem;
            text-decoration: none;
            color: inherit;
        }

        .element:hover {
            transform: scale(1.15);
            z-index: 10;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color), inset 0 0 5px var(--accent-color);
        }

        /* Clases de Colores */
        .alcalino {
            color: var(--alcalinos);
            border-top: 3px solid var(--alcalinos);
        }

        .alcalinoterreo {
            color: var(--alcalinoterreos);
            border-top: 3px solid var(--alcalinoterreos);
        }

        .transicion {
            color: var(--transicion);
            border-top: 3px solid var(--transicion);
        }

        .no-metal {
            color: var(--no-metales);
            border-top: 3px solid var(--no-metales);
        }

        .halogeno {
            color: var(--halogenos);
            border-top: 3px solid var(--halogenos);
        }

        .noble {
            color: var(--gases-nobles);
            border-top: 3px solid var(--gases-nobles);
        }

        .lantanido {
            color: var(--lantanidos);
            border-top: 3px solid var(--lantanidos);
        }

        .actinido {
            color: var(--actinidos);
            border-top: 3px solid var(--actinidos);
        }

        .otros-metales {
            color: var(--o_metales);
            border-top: 3px solid var(--o_metales);
        }

        .metaloides {
            color: var(--metaloides);
            border-top: 3px solid var(--metaloides);
        }

        .ele_desconocidos {
            color: var(--ele_desconocidos);
            border-top: 3px solid var(--ele_desconocidos);
        }

        /* Ubicación*/
        .number {
            font-size: 0.7rem;
            align-self: flex-start;
            opacity: 0.8;
        }

        .symbol {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 2px 0;
        }

        .name {
            font-size: 0.6rem;
            text-align: center;
        }

        .mass {
            color: var(--secondary);
            font-size: 0.6rem;
        }

        .details {
            display: none;
            position: absolute;
            background: var(--black);
            border: 1px solid var(--accent-color);
            padding: 5px;
            border-radius: 4px;
            bottom: 100%;
            width: 120px;
            z-index: 20;
            font-size: 0.7rem;
            color: var(--white);
            pointer-events: none;
        }

        .element:hover .details {
            display: block;
        }

        .info-label {
            color: var(--footer-color);
        }

        .info-val {
            color: var(--energy-color);
            font-weight: bold;
        }

        /* Espaciador para Lantánidos y Actínidos */
        .spacer {
            grid-row: 8;
            height: 30px;
        }
    </style>
</head>

        const container = document.getElementById('table');

        elements.forEach(el => {
            // 1. Decidimos si el contenedor principal es un link <a> o un <div>
            const card = document.createElement(el.url ? 'a' : 'div');

            // 2. Si es link, le ponemos sus atributos
            if (el.url) {
                card.href = el.url;
                card.target = "_blank";
            }

            // 3. LE ASIGNAMOS LAS CLASES Y EL GRID AL MISMO 'CARD'
            card.className = `element ${el.cat}`;
            card.style.gridColumn = el.col;
            card.style.gridRow = el.row;

            // 4. LE PONEMOS EL CONTENIDO
            card.innerHTML = `
                <div class="number">${el.n}</div>
                <div class="symbol">${el.s}</div>
                <div class="name">${el.name}</div>
                <div class="details">
                    Masa: ${el.mass}<br>
                    EN: ${el.en}<br>
                    E. Ion: ${el.ei} eV<br>
                    Ox: ${el.ox}
                </div>
            `;

            // 5. AÑADIMOS EL 'CARD' AL CONTENEDOR (No un div aparte)
            container.appendChild(card);
        });
